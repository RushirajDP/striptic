<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Striptic | Algorithmic Data Syndication</title>
    <style>
        body {
            background-color: #0B0F19;
            color: #F3F4F6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #3B82F6, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #9CA3AF;
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.6;
        }
        .badge {
            background-color: #1E293B;
            border: 1px solid #334155;
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            color: #38BDF8;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">SYSTEM STATUS: ENGINE INITIALIZING</div>
        <h1>striptic</h1>
